services:
  - type: web
    name: roshni-backend
    root_dir: ./backend
    env: python

    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 -k uvicorn.workers.UvicornWorker main:app

    envVars:
      # ✅ FORCE PYTHON VERSION (CRITICAL FIX)
      - key: PYTHON_VERSION
        value: 3.11.9

      # ============ SYSTEM ============
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "False"
      - key: LOG_LEVEL
        value: INFO

      # ============ URLS ============
      - key: BACKEND_URL
        value: https://roshni-new-dvsd.onrender.com
      - key: FRONTEND_URL
        value: https://roshni-frontend.vercel.app
      - key: ALLOWED_HOSTS
        value: roshni-new-dvsd.onrender.com,roshni-frontend.vercel.app,localhost:8000

      # ============ DATABASE ============
      - key: DATABASE_URL
        value: postgresql://roshni_user:ETv9IfWZIBuAZWB2i1jYYQ26GSsdtgAq@dpg-d77mcoh4bi0s73f0q3l0-a.oregon-postgres.render.com:5432/roshni?sslmode=require

      # ============ ALGORAND ============
      - key: ALGORAND_NETWORK
        value: testnet
      - key: ALGORAND_NODE_URL
        value: https://testnet-api.algonode.cloud
      - key: ALGORAND_INDEXER_URL
        value: https://testnet-idx.algonode.cloud
      - key: ALGORAND_ADMIN_MNEMONIC
        sync: false
      - key: ALGORAND_ADMIN_PRIVATE_KEY
        sync: false
      - key: SUN_ASA_ID
        value: "756341116"

      # ============ AI / APIs ============
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

      # ============ DISCOM ============
      - key: DISCOM_FIXED_CHARGE
        value: "150.0"
      - key: DISCOM_ADMIN_FEE_PERCENT
        value: "3.0"
      - key: DISCOM_EXPORT_RATE
        value: "3.50"
      - key: DISCOM_GRID_RATE
        value: "9.00"

      # ============ SOLAR ============
      - key: SOLAR_EXPORT_RATE
        value: "5.80"
      - key: SOLAR_POOL_RATE
        value: "6.00"

      # ============ IoT ============
      - key: IOT_AUTH_TOKEN
        sync: false

  - type: web
    name: roshni-frontend
    root_dir: ./frontend
    env: node
    nodeVersion: 18
    buildCommand: npm ci && npm run build
    startCommand: npx serve -s dist -l 3000
    envVars:
      - key: VITE_BACKEND_URL
        value: https://roshni-new-dvsd.onrender.com
